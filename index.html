<!DOCTYPE html>
<html>
<head>
    <title>Weather Website</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            background: linear-gradient(to bottom, #87CEEB, #ffffff);
            padding-top:50px;
        }

        .card{
            background:white;
            width:300px;
            margin:auto;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 10px gray;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            margin-top:15px;
        }
    </style>
</head>
<body>

<h1>🌦 Weather Website</h1>

<div class="card">
    <h2 id="city">Nagpur</h2>
    <h3 id="temp">32°C</h3>
    <p id="humidity">Humidity: 65%</p>
    <p id="condition">☀ Sunny</p>

    <button onclick="nextCity()">Next ➡</button>
</div>

<script>

const weatherData = [
{
city:"Nagpur",
temp:"32°C",
humidity:"65%",
condition:"☀ Sunny"
},
{
city:"Mumbai",
temp:"29°C",
humidity:"80%",
condition:"☁ Cloudy"
},
{
city:"Pune",
temp:"27°C",
humidity:"70%",
condition:"🌦 Rainy"
},
{
city:"Delhi",
temp:"35°C",
humidity:"55%",
condition:"☀ Hot"
},
{
city:"Bangalore",
temp:"25°C",
humidity:"75%",
condition:"☁ Pleasant"
},
{
city:"Goa",
temp:"30°C",
humidity:"78%",
condition:"🌴 Humid"
}
];

let index = 0;

function nextCity() {
    index++;
    
    if(index >= weatherData.length){
        index = 0;
    }

    document.getElementById("city").innerText = weatherData[index].city;
    document.getElementById("temp").innerText = weatherData[index].temp;
    document.getElementById("humidity").innerText = "Humidity: " + weatherData[index].humidity;
    document.getElementById("condition").innerText = weatherData[index].condition;
}

</script>

</body>
</html>
